name: Docker Build

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        # Only log in when pushing (tags or main branch), skip for PRs
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          # Push only on tags; PRs and main-branch pushes just build to validate
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/mclouds/subgen:latest
            ghcr.io/mclouds/subgen:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
