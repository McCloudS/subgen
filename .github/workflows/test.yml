name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements-test.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install test dependencies
        # Note: heavy ML packages (stable-ts, faster-whisper, torch) are NOT installed.
        # They are mocked in tests/conftest.py so CI stays fast and GPU-free.
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7
