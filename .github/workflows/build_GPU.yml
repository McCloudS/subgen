name: Build Docker images

on:
  push:
    branches: ["main", "dev"]
    paths:
      - 'subgen.py'
      - 'language_code.py'
      - 'launcher.py'
      - 'requirements.txt'
      - 'entrypoint.sh'
      - 'Dockerfile'
      - 'Dockerfile.cpu'
      - 'Dockerfile.AMD'
      - '.github/workflows/build_GPU.yml'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── GPU (CUDA) ─────────────────────────────────────────────────────────────
  gpu:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: |
          version=$(grep -oP "subgen_version\s*=\s*'\K[^']+" subgen.py)
          echo "version=$version" >> $GITHUB_ENV

      - name: Compute tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            printf 'docker_tags=mccloud/subgen:latest\nmccloud/subgen:%s' "$version" >> $GITHUB_ENV
          else
            echo "docker_tags=mccloud/subgen:dev" >> $GITHUB_ENV
          fi

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.docker_tags }}
          cache-from: type=registry,ref=mccloud/subgen:buildcache
          cache-to: type=registry,ref=mccloud/subgen:buildcache,mode=max

  # ── CPU (multi-arch) ───────────────────────────────────────────────────────
  cpu:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: |
          version=$(grep -oP "subgen_version\s*=\s*'\K[^']+" subgen.py)
          echo "version=$version" >> $GITHUB_ENV

      - name: Compute tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            printf 'docker_tags=mccloud/subgen:cpu\nmccloud/subgen:%s-cpu' "$version" >> $GITHUB_ENV
          else
            echo "docker_tags=mccloud/subgen:dev-cpu" >> $GITHUB_ENV
          fi

      - uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cpu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.docker_tags }}
          cache-from: type=registry,ref=mccloud/subgen:cpu-buildcache
          cache-to: type=registry,ref=mccloud/subgen:cpu-buildcache,mode=max

  # ── AMD (ROCm) — runs after GPU+CPU so its large upload doesn't contend ───
  # NOTE: The AMD build compiles CTranslate2 from source (CT2_GIT_REF=master).
  # Any new commit on CTranslate2 master invalidates the build cache and forces
  # a full ~10 GB re-push. Pin CT2_GIT_REF to a specific release tag in
  # Dockerfile.AMD to make layers stable and uploads instant like GPU/CPU.
  amd:
    runs-on: [self-hosted]
    needs: [gpu, cpu]
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: |
          version=$(grep -oP "subgen_version\s*=\s*'\K[^']+" subgen.py)
          echo "version=$version" >> $GITHUB_ENV

      - name: Compute tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            printf 'docker_tags=mccloud/subgen:amd\nmccloud/subgen:%s-amd' "$version" >> $GITHUB_ENV
          else
            echo "docker_tags=mccloud/subgen:dev-amd" >> $GITHUB_ENV
          fi

      # keep-state: true + a fixed name prevents the BuildKit container from being
      # destroyed between runs. BuildKit checks its local OCI store for layer digests
      # before hitting the registry, so the 12 GB amd-buildcache download is skipped
      # on every run after the first. Registry cache is kept as a cold-start fallback.
      - uses: docker/setup-buildx-action@v3
        with:
          name: subgen-amd-builder
          keep-state: true
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.AMD
          platforms: linux/amd64
          push: true
          tags: ${{ env.docker_tags }}
          cache-from: type=registry,ref=mccloud/subgen:amd-buildcache
          cache-to: type=registry,ref=mccloud/subgen:amd-buildcache,mode=max
