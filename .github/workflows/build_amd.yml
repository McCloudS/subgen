name: Build AMD Docker image

on:
  push:
    branches: ["main", "dev"]
    paths:
      - 'subgen.py'
      - 'language_code.py'
      - 'launcher.py'
      - 'requirements.txt'
      - 'entrypoint.sh'
      - 'Dockerfile.AMD'
      - '.github/workflows/build_amd.yml'
  workflow_dispatch:

concurrency:
  group: docker-amd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from subgen.py
        run: |
          version=$(grep -oP "subgen_version\s*=\s*'\K[^']+" subgen.py)
          echo "version=$version" >> $GITHUB_ENV

      - name: Compute Docker tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            printf 'docker_tags=mccloud/subgen:amd\nmccloud/subgen:%s-amd' "$version" >> $GITHUB_ENV
          else
            echo "docker_tags=mccloud/subgen:dev-amd" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.AMD
          platforms: linux/amd64
          push: true
          tags: ${{ env.docker_tags }}
          cache-from: type=registry,ref=mccloud/subgen:amd-buildcache
          cache-to: type=registry,ref=mccloud/subgen:amd-buildcache,mode=max
